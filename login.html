<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Log in to your ES Commerce account.">
  <title>Login - ES Commerce</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="auth-page">
  <div class="auth-card">
    <h1>Welcome Back</h1>
    <p class="subtitle">Login to your account</p>
    <form id="login-form">
      <div class="form-group">
        <label for="login-email">Email Address</label>
        <input type="email" id="login-email" placeholder="Enter your email" required>
        <span class="error-text">Valid email is required</span>
      </div>
      <div class="form-group">
        <label for="login-password">Password</label>
        <input type="password" id="login-password" placeholder="Enter password" required>
        <span class="error-text">Password is required</span>
      </div>
      <button type="submit" class="btn btn-primary btn-full btn-lg">Login</button>
    </form>
    <div class="auth-links">
      Don't have an account? <a href="register.html">Register here</a>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    /** Handles login form submission with validation. */
    document.getElementById('login-form').addEventListener('submit', function(event) {
      event.preventDefault();
      FormValidator.clearErrors(this);

      const email = document.getElementById('login-email');
      const password = document.getElementById('login-password');
      let valid = true;

      if (!FormValidator.validateEmail(email.value)) {
        FormValidator.showError(email, 'Please enter a valid email');
        valid = false;
      }
      if (!FormValidator.validateRequired(password.value)) {
        FormValidator.showError(password, 'Password is required');
        valid = false;
      }
      if (!valid) return;

      const result = AuthManager.login(email.value, password.value);
      if (result.success) {
        Toast.show('Login successful! Redirecting...', 'success');
        setTimeout(() => window.location.href = 'index.html', 1000);
      } else {
        Toast.show(result.message, 'error');
      }
    });
  </script>
</body>
</html>
