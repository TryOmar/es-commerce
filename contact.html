<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Contact us - ES Commerce">
  <title>Contact - ES Commerce</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <nav id="main-nav"></nav>

  <div class="contact-page">
    <h1><i class="fa-solid fa-envelope-open-text"></i> Contact Us</h1>
    <div class="contact-card">
      <form id="contact-form">
        <div class="form-group">
          <label for="contact-name"><i class="fa-solid fa-user"></i> Your Name</label>
          <input type="text" id="contact-name" placeholder="Enter your name" required>
          <span class="error-text">Name is required</span>
        </div>
        <div class="form-group">
          <label for="contact-email"><i class="fa-solid fa-envelope"></i> Email Address</label>
          <input type="email" id="contact-email" placeholder="Enter your email" required>
          <span class="error-text">Valid email is required</span>
        </div>
        <div class="form-group">
          <label for="contact-message"><i class="fa-solid fa-message"></i> Message</label>
          <textarea id="contact-message" rows="5" placeholder="How can we help you?" required></textarea>
          <span class="error-text">Message is required</span>
        </div>
        <button type="submit" class="btn btn-primary btn-lg btn-full">
          <i class="fa-solid fa-paper-plane"></i> Send Message
        </button>
      </form>
    </div>

    <div class="contact-card" style="margin-top:1.5rem">
      <h3 style="margin-bottom:1rem"><i class="fa-solid fa-circle-info"></i> Our Info</h3>
      <p style="color:var(--text-medium);margin-bottom:0.5rem">
        <i class="fa-solid fa-envelope" style="width:20px;color:var(--primary)"></i> support@escommerce.com
      </p>
      <p style="color:var(--text-medium);margin-bottom:0.5rem">
        <i class="fa-solid fa-phone" style="width:20px;color:var(--primary)"></i> +1 (555) 123-4567
      </p>
      <p style="color:var(--text-medium)">
        <i class="fa-solid fa-location-dot" style="width:20px;color:var(--primary)"></i> 123 Commerce Street, Business City
      </p>
    </div>
  </div>

  <footer class="main-footer">
    <p>&copy; 2026 ES Commerce. All rights reserved.</p>
  </footer>

  <script src="js/app.js"></script>
  <script>
    /** Initializes the contact page. */
    function initContactPage() {
      NavBuilder.build();

      document.getElementById('contact-form').addEventListener('submit', function(event) {
        event.preventDefault();
        FormValidator.clearErrors(this);

        const name = document.getElementById('contact-name');
        const email = document.getElementById('contact-email');
        const message = document.getElementById('contact-message');
        let valid = true;

        if (!FormValidator.validateRequired(name.value)) {
          FormValidator.showError(name, 'Name is required');
          valid = false;
        }
        if (!FormValidator.validateEmail(email.value)) {
          FormValidator.showError(email, 'Valid email is required');
          valid = false;
        }
        if (!FormValidator.validateRequired(message.value)) {
          FormValidator.showError(message, 'Message is required');
          valid = false;
        }
        if (!valid) return;

        Toast.show('Message sent! We\'ll get back to you soon.', 'success');
        this.reset();
      });
    }

    document.addEventListener('DOMContentLoaded', initContactPage);
  </script>
</body>
</html>
