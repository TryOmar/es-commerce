<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Product details - ES Commerce">
  <title>Product Details - ES Commerce</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <nav id="main-nav"></nav>
  <div class="product-detail" id="product-detail"></div>

  <footer class="main-footer">
    <p>&copy; 2026 ES Commerce. All rights reserved.</p>
  </footer>

  <script src="js/app.js"></script>
  <script>
    let selectedQuantity = 1;

    /** Loads and renders the product based on URL query param. */
    function initProductPage() {
      NavBuilder.build();
      const params = new URLSearchParams(window.location.search);
      const productId = params.get('id');
      const product = ProductManager.getProductById(productId);

      if (!product) {
        document.getElementById('product-detail').innerHTML =
          '<p style="text-align:center;padding:3rem;color:var(--text-light)">Product not found.</p>';
        return;
      }

      document.title = `${product.name} - ES Commerce`;
      const colorClass = ProductManager.getCategoryColor(product.category);

      document.getElementById('product-detail').innerHTML = `
        <div class="product-detail-image ${colorClass}">
          <img src="${product.image}" alt="${product.name}">
        </div>
        <div class="product-detail-info">
          <h1>${product.name}</h1>
          <div class="detail-row">
            <span class="detail-label">Product Name</span>
            <span class="detail-value">: ${product.name}</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">Price</span>
            <span class="detail-value price">: ${product.price}$</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">Category</span>
            <span class="detail-value">: ${product.category}</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">Description</span>
            <span class="detail-value">: ${product.description}</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">Quantity</span>
            <div class="quantity-control">
              <button class="quantity-btn" id="qty-minus"><i class="fa-solid fa-minus"></i></button>
              <span class="quantity-value" id="qty-display">1</span>
              <button class="quantity-btn" id="qty-plus"><i class="fa-solid fa-plus"></i></button>
            </div>
          </div>
          <button class="btn btn-accent btn-lg btn-full" id="add-to-cart-btn">
            <i class="fa-solid fa-cart-plus"></i> Add To Cart
          </button>
        </div>
      `;

      document.getElementById('qty-minus').addEventListener('click', () => updateQuantity(-1));
      document.getElementById('qty-plus').addEventListener('click', () => updateQuantity(1));
      document.getElementById('add-to-cart-btn').addEventListener('click', () => {
        CartManager.addItem(product.id, selectedQuantity);
        Toast.show(`Added ${selectedQuantity}x ${product.name} to cart!`, 'success');
      });
    }

    /** Updates the quantity display, clamped to minimum of 1. */
    function updateQuantity(delta) {
      selectedQuantity = Math.max(1, selectedQuantity + delta);
      document.getElementById('qty-display').textContent = selectedQuantity;
    }

    document.addEventListener('DOMContentLoaded', initProductPage);
  </script>
</body>
</html>
