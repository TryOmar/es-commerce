<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Your shopping cart - ES Commerce">
  <title>Cart - ES Commerce</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <nav id="main-nav"></nav>
  <div class="cart-page" id="cart-page">
    <h1><i class="fa-solid fa-cart-shopping"></i> Cart Page</h1>
    <div id="cart-items"></div>
    <div id="cart-summary"></div>
  </div>

  <footer class="main-footer">
    <p>&copy; 2026 ES Commerce. All rights reserved.</p>
  </footer>

  <script src="js/app.js"></script>
  <script>
    /** Initializes and renders the cart page. */
    function initCartPage() {
      NavBuilder.build();
      renderCart();
    }

    /** Renders all cart items and the total summary. */
    function renderCart() {
      const cart = CartManager.getCart();
      const itemsContainer = document.getElementById('cart-items');
      const summaryContainer = document.getElementById('cart-summary');

      if (cart.length === 0) {
        itemsContainer.innerHTML = `
          <div class="cart-empty">
            <span><i class="fa-solid fa-cart-shopping" style="font-size:3rem"></i></span>
            <p>Your cart is empty</p>
            <a href="index.html" class="btn btn-primary" style="margin-top:1rem">Browse Products</a>
          </div>`;
        summaryContainer.innerHTML = '';
        return;
      }

      itemsContainer.innerHTML = cart.map(item => {
        const product = ProductManager.getProductById(item.productId);
        if (!product) return '';
        const colorClass = ProductManager.getCategoryColor(product.category);
        return `
          <div class="cart-item">
            <div class="cart-item-icon ${colorClass}">
              <img src="${product.image}" alt="${product.name}">
            </div>
            <div class="cart-item-info">
              <h3>${product.name}</h3>
              <p class="price">${product.price}$</p>
            </div>
            <div class="cart-item-actions">
              <button class="quantity-btn" onclick="changeQty(${product.id}, -1)">
                <i class="fa-solid fa-minus"></i>
              </button>
              <span class="quantity-value">${item.quantity}</span>
              <button class="quantity-btn" onclick="changeQty(${product.id}, 1)">
                <i class="fa-solid fa-plus"></i>
              </button>
            </div>
            <button class="remove-btn" onclick="removeFromCart(${product.id})" title="Remove">
              <i class="fa-solid fa-xmark"></i>
            </button>
          </div>`;
      }).join('');

      const total = CartManager.getTotal();
      summaryContainer.innerHTML = `
        <div class="cart-total">
          <span class="total-label">Total Amount : ${total}$</span>
          <span class="total-amount">${total}$</span>
        </div>
        <div style="text-align:center;margin-top:1.5rem">
          <button class="btn btn-primary btn-lg" onclick="buyNow()" style="min-width:200px">
            <i class="fa-solid fa-bag-shopping"></i> Buy Now
          </button>
        </div>`;
    }

    /** Updates item quantity and re-renders cart. */
    function changeQty(productId, delta) {
      const cart = CartManager.getCart();
      const item = cart.find(i => i.productId === productId);
      if (item) {
        CartManager.updateQuantity(productId, item.quantity + delta);
        renderCart();
      }
    }

    /** Removes an item from cart and re-renders. */
    function removeFromCart(productId) {
      CartManager.removeItem(productId);
      renderCart();
      Toast.show('Item removed from cart', 'info');
    }

    /** Completes the purchase and redirects to order confirmation. */
    function buyNow() {
      if (CartManager.getCart().length === 0) return;
      CartManager.clearCart();
      window.location.href = 'order.html';
    }

    document.addEventListener('DOMContentLoaded', initCartPage);
  </script>
</body>
</html>
