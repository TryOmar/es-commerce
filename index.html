<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Shop the best products at ES Commerce.">
  <title>ES Commerce - Shop Online</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <nav id="main-nav"></nav>

  <!-- Hero Slider -->
  <div class="hero-slider" id="hero-slider">
    <div class="slide slide-1 active">
      <h2>Welcome to ES Commerce</h2>
      <p>Discover amazing products at great prices</p>
      <a href="#products" class="btn btn-accent">Shop Now</a>
    </div>
    <div class="slide slide-2">
      <h2>New Arrivals</h2>
      <p>Check out the latest in fashion and tech</p>
      <a href="#products" class="btn btn-accent">Browse Collection</a>
    </div>
    <div class="slide slide-3">
      <h2>Back to School</h2>
      <p>Everything you need for the new semester</p>
      <a href="#products" class="btn btn-primary">Shop School</a>
    </div>
    <div class="slider-dots" id="slider-dots"></div>
  </div>

  <!-- Products Section -->
  <section class="products-section" id="products">
    <h2 class="section-title">Our Products</h2>
    <div class="filter-bar">
      <select id="sort-select">
        <option value="default">Sort by</option>
        <option value="price-low">Price: Low → High</option>
        <option value="price-high">Price: High → Low</option>
        <option value="name">Name: A → Z</option>
      </select>
    </div>
    <div class="products-layout">
      <aside class="filter-sidebar">
        <h3>Categories</h3>
        <div class="category-list" id="category-list"></div>
      </aside>
      <div class="products-grid" id="products-grid"></div>
    </div>
  </section>

  <footer class="main-footer">
    <p>&copy; 2026 ES Commerce. All rights reserved.</p>
  </footer>

  <script src="js/app.js"></script>
  <script src="js/home.js"></script>
</body>
</html>
